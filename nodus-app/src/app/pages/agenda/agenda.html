<div class="agenda">
    <div class="agenda-header">
        <h1>Agenda</h1>
        <button class="new-section" (click)="openNovaSession()">
            <img src="assets/images/plus.svg">
            Nova sessão
        </button>
    </div>

    <div class="calendar">
        <mat-card class="demo-inline-calendar-card">
            <mat-calendar
                [selected]="selected()"
                [dateClass]="dateClass"
                (selectedChange)="onDateSelected($event)">
            </mat-calendar>
        </mat-card>
    </div>

    <div class="legenda">
        <span class="legenda-dot"></span>
        <span>Dias com sessão agendada</span>
    </div>
</div>
