<div class="login-container">
    <div class="img-container">
        <img class="logo" src="assets/images/logo_branca.png">
    </div>

    <div class="title-container">
        <h1 class="title">
            Nodus
        </h1>
        <h3 class="subtitle">
            Gestão de sessões terapêuticas
        </h3>
    </div>

    @if(tipoBotao == ''){
    <div class="botoes bloco" [class.ativo]="tipoBotao == ''">
        <button class="input-button" (click)="irParaLogin()">
            Login
        </button>
        <div class="divisor">
            <span class="ou">Ou</span>
            <div class="separador"></div>
        </div>
        <button class="input-button" (click)="irParaCadastro()">
            Cadastro
        </button>
    </div>
    }

    @if(tipoBotao == 'login'){
    <div class="bloco login-cadastro" [class.ativo]="tipoBotao == 'login'">
        <div class="left">
            <button class="back" (click)="voltarBotoes()">
                <img src="assets/images/back_arrow.svg">
                VOLTAR
            </button>
        </div>
        <form [formGroup]="loginForm" (ngSubmit)="fazerLogin()">
            <div class="input-container">
                <label class="title-input">EMAIL</label>
                <input class="input" type="email" placeholder="seu@email.com"
                    formControlName="email" autocomplete="email">
            </div>

            <div class="input-container">
                <label class="title-input">SENHA</label>
                <input class="input" type="password" placeholder="*******"
                    formControlName="senha" autocomplete="current-password">
            </div>

            @if(erro()) {
                <p class="erro">{{ erro() }}</p>
            }

            <button class="input-button" type="submit" [disabled]="loading()">
                {{ loading() ? 'Entrando...' : 'Entrar' }}
            </button>
        </form>
    </div>
    }

    @if(tipoBotao == 'cadastro'){
    <div class="bloco login-cadastro" [class.ativo]="tipoBotao == 'cadastro'">
        <div class="left">
            <button class="back" (click)="voltarBotoes()">
                <img src="assets/images/back_arrow.svg">
                VOLTAR
            </button>
        </div>
        <form [formGroup]="cadastroForm" (ngSubmit)="fazerCadastro()">
            <div class="input-container">
                <label class="title-input">NOME</label>
                <input class="input" type="text" placeholder="Seu nome"
                    formControlName="nome" autocomplete="name">
            </div>
            <div class="input-container">
                <label class="title-input">EMAIL</label>
                <input class="input" type="email" placeholder="seu@email.com"
                    formControlName="email" autocomplete="email">
            </div>
            <div class="input-container">
                <label class="title-input">CRP</label>
                <input class="input" type="text" placeholder="Ex: 06/12345"
                    formControlName="registro_profissional">
            </div>
            <div class="input-container">
                <label class="title-input">TELEFONE</label>
                <input class="input" type="text" placeholder="Telefone (opcional)"
                    formControlName="telefone" autocomplete="tel">
            </div>
            <div class="input-container">
                <label class="title-input">SENHA</label>
                <input class="input" type="password" placeholder="Mínimo 6 caracteres"
                    formControlName="senha" autocomplete="new-password">
            </div>
            <div class="input-container">
                <label class="title-input">CONFIRMAR SENHA</label>
                <input class="input" type="password" placeholder="*******"
                    formControlName="confirmar_senha" autocomplete="new-password">
            </div>

            @if(cadastroForm.errors?.['senhaDiferente'] && cadastroForm.touched) {
                <p class="erro">As senhas não coincidem.</p>
            }

            @if(erro()) {
                <p class="erro">{{ erro() }}</p>
            }

            <button class="input-button" type="submit" [disabled]="loading()">
                {{ loading() ? 'Criando conta...' : 'Cadastrar' }}
            </button>
        </form>
    </div>
    }

</div>
