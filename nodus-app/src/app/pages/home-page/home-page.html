<div class="home-container">
    <section class="first-section">
        <span>Bem-vindo de volta,</span>
        <h1>{{psiNome}}</h1>

        <div class="num-sections">
            <img src="assets/images/calendar.svg">
            <span>{{sessaoHoje}}</span>
        </div>
    </section>

    <section class="grid-section">
        <div class="line">
            <div class="line-card">
                <div class="img-card first">
                    <img src="assets/images/people.svg">
                </div>
                <div class="text-container">
                    <span>{{numPacientes}}</span>
                    <span>Pacientes</span>
                </div>
            </div>
            <div class="line-card">
                <div class="img-card second">
                    <img src="assets/images/check.svg">
                </div>
                <div class="text-container">
                    <span>{{numSessoesMes}}</span>
                    <span>Sessões/mês</span>
                </div>
            </div>
        </div>

        <div class="line">
            <button class="line-card special1">
                <img src="assets/images/plus.svg">
                Nova Sessão
            </button>
            <button class="line-card special2">
                <img src="assets/images/people.svg">
                Novo Paciente
            </button>
        </div>
    </section>
    
    <section class="next-section">
        <div class="next-header">
            <span>Próximas sessões</span>
            <button>
                <span class="view-button">Ver todas </span>
                <img src="assets/images/arrow.svg">
            </button>
        </div>
        <div class="next-container">
            <img src="assets/images/calendar.svg">
            <span>Nenhuma sessão agendada</span>
        </div>

    </section>

    <section>


    </section>
</div>
