<div class="pacientes-container">
    <div class="header-container">
        <div class="header-top">
            <div class="info-pacientes">
                <h1>Pacientes</h1>
                <p>{{numPacientes()}} pacientes ativos</p>
            </div>
            <button class="new-paciente" (click)="openModal()">
                <img src="assets/images/plus.svg">
                Novo
            </button>
        </div>
        <div class="header-bottom">
            <img src="assets/images/search.svg">
            <input placeholder="Buscar pacientes...">
        </div>
    </div>

    <div class="pacientes-list">
        @for (paciente of pacienteService.pacientes(); track paciente.id_paciente) {
            <div class="paciente-card" (click)="verPaciente(paciente.id_paciente)" style="cursor:pointer">
                <div class="card-top">
                    <div class="left-info">
                        <div class="profile-icon">
                            {{ iniciaisDe(paciente.nome) }}
                        </div>
                        <div class="info-card">
                            <h2>{{paciente.nome}}</h2>
                            <div class="sections">
                                {{paciente.email}}
                            </div>
                        </div>
                    </div>
                    <img src="assets/images/arrow.svg">
                </div>
                <div class="card-bottom">
                    <img src="assets/images/calendar.svg">
                    Nascimento: {{paciente.data_nascimento | date:'dd/MM/yyyy'}}
                </div>
            </div>
        } @empty {
            <div class="next-container">
                <img src="assets/images/people.svg">
                <span>Nenhum paciente cadastrado</span>
            </div>
        }
    </div>
</div>
