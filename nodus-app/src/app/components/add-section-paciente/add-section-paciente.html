<div class="new-card">
    @if (data.add === 'paciente') {
    <div class="new-container">
        <button class="close-button" mat-button mat-dialog-close>
            <img class="close" src="assets/images/close.svg">
        </button>

        <div class="text-container">
            <div class="top-text">
                <img src="assets/images/new-pacient.png">
                <h6>Novo Paciente</h6>
            </div>
            <span>Preencha os dados do paciente</span>
        </div>

        @if (erro()) {
            <p class="erro">{{erro()}}</p>
        }

        <form [formGroup]="pacienteForm" class="forms" (ngSubmit)="salvarPaciente()">
            <div class="input-container">
                <label>Nome Completo:</label>
                <input class="input" type="text" formControlName="nome" placeholder="Nome do paciente">
            </div>
            <div class="input-container">
                <label>Email:</label>
                <input class="input" type="email" formControlName="email" placeholder="email@exemplo.com">
            </div>
            <div class="row">
                <div class="input-container">
                    <label>Telefone:</label>
                    <input class="input" type="tel" formControlName="telefone" placeholder="(00) 00000-0000">
                </div>
                <div class="input-container">
                    <label>Data de Nasc.:</label>
                    <input class="input" type="date" formControlName="data_nascimento">
                </div>
            </div>
            <button class="submit-button" type="submit" [disabled]="pacienteForm.invalid || loading()">
                {{ loading() ? 'Salvando...' : 'Cadastrar Paciente' }}
            </button>
        </form>
    </div>
    }

    @if (data.add === 'sessao') {
    <div class="new-container">
        <button class="close-button" mat-button mat-dialog-close>
            <img class="close" src="assets/images/close.svg">
        </button>

        <div class="text-container">
            <div class="top-text">
                <img src="assets/images/new-section.png">
                <h6>Nova Sessão</h6>
            </div>
            <span>Agende uma sessão para um paciente</span>
        </div>

        @if (erro()) {
            <p class="erro">{{erro()}}</p>
        }

        <form [formGroup]="sessaoForm" class="forms" (ngSubmit)="salvarSessao()">
            <div class="input-container">
                <label>Paciente:</label>
                <select class="input" formControlName="id_paciente">
                    <option [ngValue]="null">-</option>
                    @for (paciente of pacientes(); track paciente.id_paciente) {
                        <option [ngValue]="paciente.id_paciente">{{ paciente.nome }}</option>
                    }
                </select>
            </div>
            <div class="row">
                <div class="input-container">
                    <label>Data:</label>
                    <input class="input" type="date" formControlName="data">
                </div>
                <div class="input-container">
                    <label>Horário:</label>
                    <input class="input" type="time" formControlName="horario">
                </div>
            </div>
            @if (sessaoNoPassado) {
                <div class="input-container">
                    <label>Estado emocional do paciente:</label>
                    <select class="input" formControlName="humor">
                        <option [ngValue]="null">- Não registrado -</option>
                        @for (emocao of EMOCOES; track emocao.valor) {
                            <option [ngValue]="emocao.valor">{{ emocao.emoji }} {{ emocao.label }}</option>
                        }
                    </select>
                </div>
            }
            <div class="input-container">
                <label>Observações:</label>
                <input class="input" type="text" formControlName="observacoes"
                    placeholder="Temas, evolução, exercícios propostos...">
            </div>
            <button class="submit-button" type="submit" [disabled]="sessaoForm.invalid || loading()">
                {{ loading() ? 'Salvando...' : 'Agendar Sessão' }}
            </button>
        </form>
    </div>
    }
</div>
