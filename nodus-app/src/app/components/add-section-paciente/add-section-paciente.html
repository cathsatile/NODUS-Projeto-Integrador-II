<div class="new-card">
    @if(data.add == 'paciente'){
    <div class="new-container">
        <button class="close-button" mat-button mat-dialog-close>
            <img class="close" src="assets/images/close.svg">
        </button>
        <div class="text-container">
            <div class="top-text">
                <img src="assets/images/new-pacient.png">
                <h6>Novo Paciente</h6>
            </div>
            <span>Preencha os dados do paciente</span>
        </div>
        <form class="forms" (ngSubmit)="salvarPaciente()">
            <div class="input-container">
                <label>Nome Completo:</label>
                <input class="input" type="text" placeholder="Nome do paciente">
            </div>
            <div class="row">
                <div class="input-container">
                    <label>Telefone:</label>
                    <input class="input" type="tel" placeholder="(00) 00000-0000">
                </div>
                <div class="input-container">
                    <label>Data de Nasc.:</label>
                    <input class="input" type="text">
                </div>

            </div>
            <div class="input-container">
                <label>Email:</label>
                <input class="input" type="email" placeholder="email@exemplo.com">
            </div>
            <div class="input-container">
                <label>Observações:</label>
                <input class="input" type="text" placeholder="Queixa principal, histórico relevante...">
            </div>
            <button class="submit-button" type="submit">
                Cadastrar Paciente
            </button>
        </form>
    </div>
    }

    @if(data.add == 'sessao'){
    <div class="new-container">
        <button class="close-button" mat-button mat-dialog-close>
            <img class="close" src="assets/images/close.svg">
        </button>
        <div class="text-container">
            <div class="top-text">
                <img src="assets/images/new-section.png">
                <h6>Nova Sessão</h6>
            </div>
            <span>Agende uma sessão para um paciente</span>
        </div>
        <form class="forms" (ngSubmit)="salvarSessao()">
            <div class="input-container">
                <label for="paciente">Paciente:</label>

                <select id="paciente" class="input" [(ngModel)]="pacienteSelecionado">
                    <option value="">
                        -
                    </option>
                    @for (paciente of pacienteList; track paciente.id) {
                    <option [value]="paciente.id">
                        {{ paciente.nome }}
                    </option>
                    }
                </select>
            </div>
            <div class="row">
                <div class="input-container">
                    <label>Data:</label>
                    <input class="input" type="date">
                </div>
                <div class="input-container">
                    <label>Horário:</label>
                    <input class="input" type="time">
                </div>
            </div>
            <div class="row">
                <div class="input-container">
                    <label>Duração (min):</label>
                    <input class="input" type="number">
                </div>
                <div class="input-container">
                    <label for="humor">Humor:</label>

                    <select id="humor" class="input" [(ngModel)]="humorSelecionado">
                        <option value="">-</option>
                        <option value="1">😢 Muito Mal</option>
                        <option value="2">😟 Mal</option>
                        <option value="3">😐 Neutro</option>
                        <option value="4">😊 Bem</option>
                        <option value="5">😆 Muito Bem</option>
                    </select>
                </div>
            </div>
            <div class="input-container">
                <label>Temas Abordados:</label>
                <input class="input" type="text" placeholder="Ansiedade, sono, trabalho...">
            </div>
            <div class="input-container">
                <label>Nota de sessão:</label>
                <input class="input" type="text" placeholder="Observações, evolução, exercícios propostos...">
            </div>
            <button class="submit-button" type="submit">
                Agendar Sessão
            </button>
        </form>
    </div>
    }
</div>
