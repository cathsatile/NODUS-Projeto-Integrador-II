<div class="header-container">
    @if (!networkStatus.isOnline()) {
        <div class="offline-banner">
            Sem conexão — exibindo dados locais
        </div>
    }
    <div class="header">
        <div class="logo-titulo">
            <img src="assets/images/logo_sem_texto.png">
            <h1>
                NODUS
            </h1>
        </div>

        <div class="right-container">
            <button (click)="irParaPerfil()">
                {{iniciaisPsicologo()}}
            </button>
            <button (click)="logout()">
                <img src="assets/images/sign-out.svg">
            </button>
        </div>
    </div>
</div>
